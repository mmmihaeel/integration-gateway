<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="100%" height="100%" style="background-color:#020617;font-family:system-ui,-apple-system,sans-serif;">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1E293B" opacity="0.6"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <text x="50" y="50" font-size="20" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">Async flow</text>
  <path d="M 220 180 L 280 180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 440 180 L 500 180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 660 180 L 720 180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 880 180 L 940 180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="156" width="160" height="48" rx="8" fill="#0F172A" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="140" y="185" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">Trigger</text>
  <rect x="280" y="156" width="160" height="48" rx="8" fill="#0F172A" stroke="#F97316" stroke-width="1.5"/>
  <text x="360" y="185" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">RabbitMQ</text>
  <rect x="500" y="156" width="160" height="48" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
  <text x="580" y="185" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">Worker</text>
  <rect x="720" y="156" width="160" height="48" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="800" y="185" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">Dispatch</text>
  <rect x="940" y="156" width="160" height="48" rx="8" fill="#0F172A" stroke="#A855F7" stroke-width="1.5"/>
  <text x="1020" y="185" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">Audit</text>
</svg>
