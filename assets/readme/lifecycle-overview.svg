<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="100%" height="100%" style="background-color:#020617;font-family:system-ui,-apple-system,sans-serif;">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1E293B" opacity="0.6"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#A855F7"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <text x="60" y="50" font-size="20" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">Lifecycle overview</text>
  <text x="60" y="74" font-size="13" font-weight="400" fill="#94A3B8">State progression of an ingested event</text>
  <path d="M 190 150 L 252 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 390 150 L 452 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 590 150 L 652 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 790 150 L 820 150 L 820 100 L 852 100" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 790 150 L 820 150 L 820 200 L 852 200" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 990 200 L 1052 200" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 1120 224 L 1120 280 L 520 280 L 520 182" fill="none" stroke="#A855F7" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-purple)"/>
  <rect x="60" y="126" width="130" height="48" rx="24" fill="#0F172A" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="155" font-size="14" font-weight="600" fill="#94A3B8" text-anchor="middle">Raw Event</text>
  <rect x="260" y="126" width="130" height="48" rx="24" fill="#082F49" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="155" font-size="14" font-weight="600" fill="#38BDF8" text-anchor="middle">Normalized</text>
  <rect x="460" y="126" width="130" height="48" rx="24" fill="#431407" stroke="#F97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="155" font-size="14" font-weight="600" fill="#FB923C" text-anchor="middle">Queued</text>
  <rect x="660" y="126" width="130" height="48" rx="24" fill="#172554" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="155" font-size="14" font-weight="600" fill="#60A5FA" text-anchor="middle">Processing</text>
  <rect x="860" y="76" width="130" height="48" rx="24" fill="#022C22" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="925" y="105" font-size="14" font-weight="600" fill="#34D399" text-anchor="middle">Delivered</text>
  <rect x="860" y="176" width="130" height="48" rx="24" fill="#450A0A" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="925" y="205" font-size="14" font-weight="600" fill="#F87171" text-anchor="middle">Failed</text>
  <rect x="1060" y="176" width="130" height="48" rx="24" fill="#3B0764" stroke="#A855F7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1125" y="205" font-size="14" font-weight="600" fill="#C084FC" text-anchor="middle">Replayed</text>
</svg>
