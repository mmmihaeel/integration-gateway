<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="100%" height="100%" style="background-color:#020617;font-family:system-ui,-apple-system,sans-serif;">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
